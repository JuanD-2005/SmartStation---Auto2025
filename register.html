<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex min-h-screen items-center justify-center bg-gradient-to-br from-[#2C2C2C] via-[#3B2F2F] to-[#594120] font-sans">

    <!-- Contenedor -->
    <div class="bg-white/10 backdrop-blur-lg shadow-xl rounded-2xl p-8 w-full max-w-md border border-white/20 animate-fadeIn">
        
        <!-- Título -->
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-white tracking-wide">🚨 Estación Inteligente</h1>
            <p class="text-gray-300 mt-1 text-sm">Crea tu cuenta para acceder</p>
        </div>

        <!-- Formulario -->
        <form class="flex flex-col space-y-4" action="#" method="POST" onsubmit="return false;">
            
            <div>
                <label class="text-gray-200 text-sm">Correo Electrónico</label>
                <input id="emailInput" 
                       class="mt-1 p-3 w-full rounded-lg bg-white/20 text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-yellow-500" 
                       type="email" 
                       placeholder="ejemplo@correo.com">
            </div>

            <div>
                <label class="text-gray-200 text-sm">Contraseña</label>
                <input id="passwordInput" 
                       class="mt-1 p-3 w-full rounded-lg bg-white/20 text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-yellow-500" 
                       type="password" 
                       placeholder="••••••••">
            </div>

            <!-- Botón registro -->
            <button class="bg-yellow-600 hover:bg-yellow-700 transition-all text-white font-semibold rounded-lg py-3 shadow-lg" 
                    type="button" 
                    onclick="registerUser()">
                Registrarse
            </button>

            <p class="text-center text-gray-300 text-sm">
                ¿Ya tienes una cuenta?
                <a href="/login.html" class="text-yellow-400 hover:underline">Inicia sesión aquí</a>
            </p>
        </form>
    </div>

    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import {
            getAuth,
            createUserWithEmailAndPassword,
            signOut
        } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB8H_NiawBVq3u1KgXZ0dqnwifzCPqgPgY",
            authDomain: "automatizacion-2025-1.firebaseapp.com",
            databaseURL: "https://automatizacion-2025-1-default-rtdb.firebaseio.com",
            projectId: "automatizacion-2025-1",
            storageBucket: "automatizacion-2025-1.firebasestorage.app",
            messagingSenderId: "1084824806433",
            appId: "1:1084824806433:web:651b6cd9bec6b49bf0ef60"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.registerUser = function () {
            const email = document.getElementById("emailInput").value;
            const password = document.getElementById("passwordInput").value;

            if (!email || !password) {
                alert("Por favor completa todos los campos.");
                return;
            }

            createUserWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    console.log("Usuario registrado:", userCredential.user.email);
                    return signOut(auth);
                })
                .then(() => {
                    window.location.href = "login.html";
                })
                .catch((error) => {
                    console.error("Error al registrar:", error.message);
                    alert("Error: " + error.message);
                });
        };
    </script>

    <!-- Animación simple -->
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn {
            animation: fadeIn 0.6s ease-out;
        }
    </style>

</body>
</html>
